<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>紅線公車｜附近往淡水信義線的車</title>
<style>
  :root{
    --red:#D8202F;        /* 淡水信義線識別紅（招牌色） */
    --red-deep:#A6121E;
    --ink:#17171B;
    --slate:#6B7079;
    --line:#ECE9E2;
    --paper:#FAF8F3;
    --card:#FFFFFF;
    --go:#1E9E64;         /* 即將進站：功能性提示 */
    --shadow:0 1px 2px rgba(20,20,25,.06),0 6px 18px rgba(20,20,25,.06);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    background:var(--paper);color:var(--ink);
    line-height:1.5;-webkit-font-smoothing:antialiased;
    padding:env(safe-area-inset-top) 0 calc(24px + env(safe-area-inset-bottom));
  }
  .wrap{max-width:520px;margin:0 auto;padding:0 18px}

  /* 標題 */
  header{padding:26px 0 18px}
  .eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:13px;letter-spacing:.04em;color:var(--slate);font-weight:600}
  .eyebrow .dot{width:11px;height:11px;border-radius:50%;background:var(--red);box-shadow:0 0 0 3px rgba(216,32,47,.16)}
  h1{font-size:30px;line-height:1.12;margin:.32em 0 .16em;font-weight:800;letter-spacing:-.01em}
  .sub{color:var(--slate);font-size:15px;margin:0;max-width:34ch}

  /* 主要動作 */
  .go-btn{
    width:100%;border:0;cursor:pointer;margin-top:20px;
    background:var(--red);color:#fff;border-radius:16px;
    padding:18px 20px;font-size:18px;font-weight:800;font-family:inherit;
    display:flex;align-items:center;justify-content:center;gap:10px;
    box-shadow:0 8px 22px rgba(216,32,47,.28);transition:transform .08s ease,background .15s ease;
  }
  .go-btn:active{transform:scale(.985);background:var(--red-deep)}
  .go-btn[disabled]{opacity:.6;box-shadow:none}
  .go-btn .spin{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.45);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .status{margin:14px 2px 0;font-size:13.5px;color:var(--slate);min-height:18px}

  /* 結果：一條紅線，公車像掛在線上的車站 */
  .results{position:relative;margin:26px 0 0;padding-left:26px}
  .results::before{content:"";position:absolute;left:6px;top:8px;bottom:8px;width:3px;border-radius:3px;
    background:linear-gradient(var(--red),var(--red-deep))}
  .results.empty::before{display:none}

  .card{position:relative;background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:14px 16px;margin-bottom:14px;box-shadow:var(--shadow);
    display:block;animation:rise .32s ease both}
  .card::before{content:"";position:absolute;left:-23px;top:27px;
    width:13px;height:13px;border-radius:50%;background:#fff;border:3.5px solid var(--red)}
  .card .top{display:flex;align-items:center;gap:12px}
  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  /* 定位模式切換 */
  .locmode{margin-top:18px}
  .seg{display:flex;background:#fff;border:1px solid var(--line);border-radius:12px;padding:4px;gap:4px;box-shadow:var(--shadow)}
  .seg-btn{flex:1;border:0;background:transparent;font-family:inherit;font-size:15px;font-weight:700;color:var(--slate);padding:10px;border-radius:9px;cursor:pointer;transition:background .15s ease,color .15s ease}
  .seg-btn.active{background:var(--ink);color:#fff}
  .manual-box{display:flex;gap:10px;margin-top:12px;animation:rise .25s ease both}
  .manual-box>div{flex:1}
  .manual-box label{display:block;font-size:12px;font-weight:700;color:var(--slate);margin:0 0 5px 2px}
  .manual-box input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;font-size:15px;font-family:inherit;background:#fff;font-variant-numeric:tabular-nums}
  .dir-seg{margin-top:10px}
  .dir-seg .seg-btn{font-size:14px}
  .dir-seg .seg-btn.active{background:var(--red)}

  .badge{flex:0 0 auto;min-width:54px;height:42px;padding:0 11px;border-radius:10px;
    background:var(--red);color:#fff;font-weight:800;font-size:18px;
    display:flex;align-items:center;justify-content:center;letter-spacing:.01em}
  .stop{flex:1 1 auto;min-width:0;font-weight:800;font-size:18px;line-height:1.2;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .info{margin-top:10px;display:flex;flex-direction:column;gap:5px}
  .meta{font-size:14px;color:var(--slate);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .mrt{display:inline-flex;align-items:center;gap:5px}
  .mrt::before{content:"";width:9px;height:9px;border-radius:50%;background:var(--red);flex:0 0 auto}
  .meta.getoff{font-weight:700;color:var(--ink)}
  .meta.depart{font-weight:800;color:var(--go)}
  .meta.depart.late{color:var(--red)}
  .nav{display:flex;gap:8px;margin-top:12px}
  .nav-btn{flex:1 1 0;display:inline-flex;align-items:center;justify-content:center;gap:5px;
    font-size:13px;font-weight:700;color:var(--ink);text-decoration:none;
    background:#F1F3F5;border:1px solid #E3E6EA;border-radius:11px;
    min-height:44px;padding:0 6px;line-height:1.15;text-align:center;
    -webkit-tap-highlight-color:transparent}
  .nav-btn:active{background:#E3E6EA}
  .eta{flex:0 0 auto;text-align:right;min-width:56px}
  .eta .num{font-size:30px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
  .eta .unit{font-size:12px;color:var(--slate);font-weight:600}
  .eta.soon .num{color:var(--go)}
  .eta.soon .unit{color:var(--go)}

  /* 空狀態 / 計程車建議 */
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--shadow);margin-top:6px}
  .panel h2{font-size:17px;margin:0 0 4px;font-weight:800}
  .panel p{margin:0 0 12px;color:var(--slate);font-size:14px}
  .taxi-list{list-style:none;margin:0;padding:0}
  .taxi-list li{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-top:1px solid var(--line);font-size:15px}
  .taxi-list li:first-child{border-top:0}
  .taxi-list .d{color:var(--slate);font-size:13.5px;font-variant-numeric:tabular-nums}

  .error{border-color:#f3c9cd;background:#fff5f5}
  .error h2{color:var(--red-deep)}

  /* 設定（金鑰 / 手動位置） */
  footer{margin-top:30px;text-align:center;font-size:12.5px;color:var(--slate)}
  footer a{color:var(--slate);text-decoration:underline;cursor:pointer}
  .settings{margin-top:16px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow);display:none}
  .settings.open{display:block}
  .settings label{display:block;font-size:13px;font-weight:700;margin:10px 0 5px}
  .settings input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;font-size:15px;font-family:inherit;background:#fff}
  .settings .row{display:flex;gap:10px}
  .settings .row>div{flex:1}
  .save{margin-top:14px;width:100%;border:0;background:var(--ink);color:#fff;border-radius:11px;padding:13px;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit}
  .hint{font-size:12px;color:var(--slate);margin-top:8px;line-height:1.45}
  .dest-box{margin:12px 0}
  .dest-box label{display:block;font-size:13px;color:var(--slate);font-weight:600;margin-bottom:8px}
  .dest-hint{font-weight:400;color:var(--slate);opacity:.8}
  .dest-chips{display:flex;flex-wrap:wrap;gap:7px}
  .chip{font-size:14px;font-weight:600;color:var(--ink);background:#fff;border:1px solid var(--line);
    border-radius:999px;padding:8px 13px;line-height:1;cursor:pointer;font-family:inherit;
    -webkit-tap-highlight-color:transparent;transition:background .12s,border-color .12s}
  .chip.active{background:var(--red);border-color:var(--red);color:#fff}
  .chip.all.active{background:var(--ink);border-color:var(--ink)}
  .dest-co .chip.all{display:none}  /* 紅線到公司模式：沒有「全部」 */
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span class="eyebrow"><span class="dot"></span>淡水信義線 · 即時公車</span>
    <h1>附近往紅線的車</h1>
    <p class="sub">按一下，用你現在的位置找出附近哪些公車能往紅線捷運站方向搭，以及還有幾分鐘進站。</p>
  </header>

  <div class="locmode">
    <div class="seg" id="seg">
      <button class="seg-btn active" data-mode="gps">📍 GPS 定位</button>
      <button class="seg-btn" data-mode="manual">✏️ 手動座標</button>
    </div>
    <div id="manualBox" class="manual-box" hidden>
      <div><label id="mlatLabel">緯度</label><input id="mlat" value="25.1047732" inputmode="decimal"></div>
      <div><label>經度</label><input id="mlon" value="121.5141796" inputmode="decimal"></div>
    </div>
    <div id="dirSeg" class="seg dir-seg" hidden>
      <button class="seg-btn active" data-dir="toRed">🚌→🔴 往紅線</button>
      <button class="seg-btn" data-dir="toCompany">🔴→🏢 紅線到公司</button>
    </div>
  </div>

  <div class="dest-box">
    <label id="destLabel">目的地捷運站<span class="dest-hint">（可複選，不選＝全部）</span></label>
    <div id="dest" class="dest-chips"><button type="button" class="chip all" data-name="">全部</button></div>
  </div>

  <button id="go" class="go-btn">🔴&nbsp; 查附近的車</button>
  <div id="status" class="status"></div>

  <div id="results" class="results" hidden></div>
  <div id="panel" hidden></div>

  <div id="settings" class="settings">
    <label>TDX Client Id</label>
    <input id="cid" placeholder="貼上 Client Id" autocomplete="off">
    <label>TDX Client Secret</label>
    <input id="csec" placeholder="貼上 Client Secret" autocomplete="off">
    <button id="save" class="save">儲存設定</button>
    <p class="hint">金鑰只存在這支手機的瀏覽器裡，不會上傳。位置請用上方的「GPS 定位／手動座標」切換。</p>
  </div>

  <footer>
    資料來源：交通部 TDX · <a id="toggleSettings">設定</a>
  </footer>
</div>

<script>
/* ====== 可在部署前先填好金鑰，老婆開了就能用、不用再輸入 ====== */
const CONFIG = {
  CLIENT_ID: "",       // ← 在這裡貼上你的 TDX Client Id（填了她就免設定）
  CLIENT_SECRET: "",   // ← 在這裡貼上你的 TDX Client Secret
  // 拿不到 GPS 時，預設使用的地點：文承路26號（北士科）
  DEFAULT_LAT: 25.1047732,
  DEFAULT_LON: 121.5141796,
};

/* ====== 參數 ====== */
const TOKEN_URL = "https://tdx.transportdata.tw/auth/realms/TDXConnect/protocol/openid-connect/token";
const BASE_BASIC = "https://tdx.transportdata.tw/api/basic";        // 基礎服務：路線站序、捷運站
const BASE_ADVANCED = "https://tdx.transportdata.tw/api/advanced";  // 進階服務：附近(NearBy)
const CITY = "Taipei";          // 台北市；新北市的公車改成 "NewTaipei"
const RED_PREFIX = "R";         // 淡水信義線捷運站代碼皆以 R 開頭
const SEARCH_RADIUS_M = 400;    // 搜尋附近公車站半徑
const MRT_MATCH_M = 200;        // 公車站離捷運站多近算「到得了」
const COMPANY_MATCH_M = 400;    // 「紅線到公司」模式：公車站離公司座標多近算「到得了」
const MAX_ETA_MIN = 60;         // 只列 N 分鐘內進站的車
const WALK_SPEED_MPM = 80;      // 走路速度（公尺/分鐘），用來估「幾點要出發」
const DEFAULT_DEST = "明德";    // 預設選好的目的地捷運站（""＝全部；可填多個用逗號分隔）

/* ====== 小工具 ====== */
const $ = s => document.querySelector(s);
const safeLS = {
  get(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } },
  set(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
};
let MEM = {};
function getKeys(){
  return {
    id: CONFIG.CLIENT_ID || safeLS.get("tdx_id") || MEM.id || "",
    secret: CONFIG.CLIENT_SECRET || safeLS.get("tdx_secret") || MEM.secret || "",
  };
}
function haversine(la1,lo1,la2,lo2){
  const R=6371000,r=Math.PI/180;
  const dphi=(la2-la1)*r, dl=(lo2-lo1)*r;
  const a=Math.sin(dphi/2)**2+Math.cos(la1*r)*Math.cos(la2*r)*Math.sin(dl/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}
function setStatus(t){ $("#status").textContent = t || ""; }

/* ====== TDX ====== */
let _token=null, _exp=0;
async function getToken(){
  if(_token && Date.now() < _exp-60000) return _token;
  const {id,secret}=getKeys();
  if(!id||!secret) throw {kind:"nokey"};
  const body=new URLSearchParams({grant_type:"client_credentials",client_id:id,client_secret:secret});
  let r;
  try{
    r=await fetch(TOKEN_URL,{method:"POST",headers:{"content-type":"application/x-www-form-urlencoded"},body});
  }catch(e){ throw {kind:"network",where:"取得 token",detail:String((e&&e.message)||e)}; }
  if(!r.ok) throw {kind:"auth",status:r.status};
  const j=await r.json();
  _token=j.access_token; _exp=Date.now()+ (j.expires_in||86400)*1000;
  return _token;
}
async function tdx(path,params,base){
  const token=await getToken();
  const q=new URLSearchParams(params||{}); q.set("$format","JSON");
  let r;
  try{
    r=await fetch((base||BASE_BASIC)+path+"?"+q.toString(),{headers:{authorization:"Bearer "+token}});
  }catch(e){ throw {kind:"network",where:path,detail:String((e&&e.message)||e)}; }
  if(r.status===429) throw {kind:"rate"};
  if(!r.ok) throw {kind:"api",status:r.status,path};
  return r.json();
}
async function getRedStations(){
  const data=await tdx("/v2/Rail/Metro/Station/TRTC");
  const out=[];
  for(const s of data){
    const id=s.StationID||"";
    if(!id.startsWith(RED_PREFIX)) continue;
    const p=s.StationPosition||{};
    if(p.PositionLat&&p.PositionLon)
      out.push({name:(s.StationName&&s.StationName.Zh_tw)||id,lat:p.PositionLat,lon:p.PositionLon});
  }
  return out;
}
async function getNearbyETAs(lat,lon,radius){
  const r=Math.min(Math.max(Math.round(radius),50),1000); // API 上限 1000m
  const sf=`nearby(${lat.toFixed(6)}, ${lon.toFixed(6)}, ${r})`;
  return tdx("/v2/Bus/EstimatedTimeOfArrival/NearBy",{$spatialFilter:sf,$top:200},BASE_ADVANCED);
}
const _sorCache={};
async function getStopOfRoute(route){
  if(_sorCache[route]) return _sorCache[route];
  let res={};
  try{
    const data=await tdx("/v2/Bus/StopOfRoute/City/"+CITY+"/"+encodeURIComponent(route),{$top:50});
    for(const e of data){
      const dir=e.Direction??0;
      res[dir]=(e.Stops||[]).map(st=>{
        const p=st.StopPosition||{};
        return {uid:st.StopUID,name:(st.StopName&&st.StopName.Zh_tw)||"",seq:st.StopSequence,lat:p.PositionLat,lon:p.PositionLon};
      });
    }
  }catch(e){ res={}; }
  _sorCache[route]=res;
  return res;
}
function reachesRedAfter(stops,boardSeq,red){
  let best=null;
  for(const st of stops){
    if(st.seq==null||boardSeq==null||st.seq<=boardSeq) continue;
    if(st.lat==null||st.lon==null) continue;
    for(const m of red){
      if(haversine(st.lat,st.lon,m.lat,m.lon)<=MRT_MATCH_M){
        const ride=st.seq-boardSeq;
        if(!best||ride<best.ride) best={mrt:m.name,ride,getOff:st.name,
          getOffLat:st.lat,getOffLon:st.lon,mrtLat:m.lat,mrtLon:m.lon};
      }
    }
  }
  return best;
}
// 「紅線到公司」模式：上車後是否有下游站牌到「公司座標」附近；回傳最少站數那班的下車站
function reachesPointAfter(stops,boardSeq,lat,lon){
  let best=null;
  for(const st of stops){
    if(st.seq==null||boardSeq==null||st.seq<=boardSeq) continue;
    if(st.lat==null||st.lon==null) continue;
    const d=haversine(st.lat,st.lon,lat,lon);
    if(d<=COMPANY_MATCH_M){
      const ride=st.seq-boardSeq;
      if(!best||ride<best.ride) best={ride,getOff:st.name,getOffLat:st.lat,getOffLon:st.lon};
    }
  }
  return best;
}

/* ====== 定位 ====== */
let locMode="gps";
// 搜尋方向："toRed"＝附近往紅線（預設）；"toCompany"＝從選定捷運站搭公車到公司座標（限手動座標）
let searchDir="toRed";
function getPosition(){
  if(locMode==="manual"){
    const mlat=parseFloat($("#mlat").value), mlon=parseFloat($("#mlon").value);
    if(!isNaN(mlat)&&!isNaN(mlon)) return Promise.resolve({lat:mlat,lon:mlon,manual:true});
    // 手動模式但座標沒填好 → 退回預設地點
    if(CONFIG.DEFAULT_LAT&&CONFIG.DEFAULT_LON)
      return Promise.resolve({lat:CONFIG.DEFAULT_LAT,lon:CONFIG.DEFAULT_LON,fallback:true});
    return Promise.resolve(null);
  }
  // GPS 模式
  return new Promise((resolve)=>{
    const fallback=()=>{
      if(CONFIG.DEFAULT_LAT&&CONFIG.DEFAULT_LON)
        resolve({lat:CONFIG.DEFAULT_LAT,lon:CONFIG.DEFAULT_LON,fallback:true});
      else resolve(null);
    };
    if(!navigator.geolocation) return fallback();
    navigator.geolocation.getCurrentPosition(
      p=>resolve({lat:p.coords.latitude,lon:p.coords.longitude}),
      ()=>fallback(),
      {enableHighAccuracy:true,timeout:12000,maximumAge:30000}
    );
  });
}

/* ====== 主流程 ====== */
async function run(){
  const btn=$("#go");
  $("#results").hidden=true; $("#panel").hidden=true; $("#results").innerHTML=""; $("#panel").innerHTML="";
  btn.disabled=true; btn.innerHTML='<span class="spin"></span> 搜尋中…';
  try{
    if(!getKeys().id){ openSettings(); throw {kind:"nokey"}; }
    setStatus("定位中…");
    const pos=await getPosition();
    if(!pos) throw {kind:"geo"};
    if(searchDir==="toCompany"){
      setStatus("以公司座標查詢…");
      await runToCompany(pos);
    }else{
      setStatus(pos.manual?"使用手動座標…":pos.fallback?"GPS 不可用，改用預設地點（文承路26號）查詢…":"已定位，查詢附近公車…");
      await runToRed(pos);
    }
  }catch(err){
    renderError(err);
  }finally{
    btn.disabled=false; btn.innerHTML='🔴&nbsp; 重新查詢';
  }
}

// 模式①：用「你的位置」找附近往紅線方向的車
async function runToRed(pos){
  const [red,etas]=await Promise.all([getRedStations(), getNearbyETAs(pos.lat,pos.lon,SEARCH_RADIUS_M)]);
  populateDest(red);
  // 依已選膠囊篩選目的地捷運站；沒選或都不存在就用全部
  let redUse=_destSel.size?red.filter(m=>_destSel.has(m.name)):red;
  if(!redUse.length) redUse=red;

  const cand=dedupeETAs(etas);
  const routes=[...new Set([...cand.values()].map(c=>c.route))];
  await Promise.all(routes.map(getStopOfRoute));

  const results=[];
  for(const c of cand.values()){
    const stops=(_sorCache[c.route]||{})[c.dir]||[];
    let boardPos=null, boardSeq=c.seq;
    for(const st of stops){ if(st.uid===c.uid){ boardPos=st; if(boardSeq==null) boardSeq=st.seq; break; } }
    const hit=reachesRedAfter(stops,boardSeq,redUse);
    if(!hit) continue;
    const walk=boardPos&&boardPos.lat?haversine(pos.lat,pos.lon,boardPos.lat,boardPos.lon):null;
    results.push({dir:"toRed",route:c.route,stop:c.stop,etaMin:Math.round(c.eta/60),mrt:hit.mrt,ride:hit.ride,getOff:hit.getOff,walk,
      fromLat:pos.lat,fromLon:pos.lon,
      boardLat:boardPos&&boardPos.lat,boardLon:boardPos&&boardPos.lon,
      getOffLat:hit.getOffLat,getOffLon:hit.getOffLon,
      mrtLat:hit.mrtLat,mrtLon:hit.mrtLon});
  }

  if(!results.length){ renderEmpty(pos,redUse); return; }
  results.sort((a,b)=>((a.walk??9999)-(b.walk??9999))||(a.etaMin-b.etaMin));
  renderResults(results);
  setStatus(`找到 ${results.length} 個選擇 · ${nowHm()} 更新`);
}

// 模式②：從選定的幾個捷運站附近，找能開到「公司座標」(pos) 附近的車
async function runToCompany(pos){
  const red=await getRedStations();
  populateDest(red);
  const origins=red.filter(m=>_destSel.has(m.name));
  if(!origins.length) throw {kind:"noorigin"};   // 此模式至少要選一個出發捷運站

  // 在每個出發捷運站附近各查一次 NearBy（並行；單站失敗不影響其他）
  const etaLists=await Promise.all(origins.map(o=>getNearbyETAs(o.lat,o.lon,SEARCH_RADIUS_M).catch(()=>[])));

  // 合併候選，並記住每班車是從哪個捷運站附近上車
  const cand=new Map();
  origins.forEach((o,i)=>{
    for(const e of etaLists[i]){
      if((e.StopStatus??0)!==0) continue;
      const eta=e.EstimateTime;
      if(eta==null||eta>MAX_ETA_MIN*60) continue;
      const route=(e.RouteName&&e.RouteName.Zh_tw)||"";
      const stop=(e.StopName&&e.StopName.Zh_tw)||"";
      const key=[o.name,route,e.Direction??0,e.StopUID||"",stop,e.StopSequence].join("|");
      if(!cand.has(key)||eta<cand.get(key).eta)
        cand.set(key,{origin:o,route,dir:e.Direction??0,uid:e.StopUID||"",stop,seq:e.StopSequence,eta});
    }
  });

  const routes=[...new Set([...cand.values()].map(c=>c.route))];
  await Promise.all(routes.map(getStopOfRoute));

  const results=[];
  for(const c of cand.values()){
    const stops=(_sorCache[c.route]||{})[c.dir]||[];
    let boardPos=null, boardSeq=c.seq;
    for(const st of stops){ if(st.uid===c.uid){ boardPos=st; if(boardSeq==null) boardSeq=st.seq; break; } }
    const hit=reachesPointAfter(stops,boardSeq,pos.lat,pos.lon);
    if(!hit) continue;
    // 走路距離：從出發捷運站走到上車站牌
    const walk=boardPos&&boardPos.lat?haversine(c.origin.lat,c.origin.lon,boardPos.lat,boardPos.lon):null;
    results.push({dir:"toCompany",route:c.route,stop:c.stop,etaMin:Math.round(c.eta/60),
      originMrt:c.origin.name,ride:hit.ride,getOff:hit.getOff,walk,
      fromLat:c.origin.lat,fromLon:c.origin.lon,
      boardLat:boardPos&&boardPos.lat,boardLon:boardPos&&boardPos.lon,
      getOffLat:hit.getOffLat,getOffLon:hit.getOffLon,
      mrtLat:pos.lat,mrtLon:pos.lon});   // mrtLat/Lon 此模式代表「公司」終點
  }

  if(!results.length){ renderEmptyCompany(origins); return; }
  results.sort((a,b)=>((a.walk??9999)-(b.walk??9999))||(a.etaMin-b.etaMin));
  renderResults(results);
  setStatus(`找到 ${results.length} 個選擇 · ${nowHm()} 更新`);
}

// 每個(路線,方向,站牌)取最近一班
function dedupeETAs(etas){
  const cand=new Map();
  for(const e of etas){
    if((e.StopStatus??0)!==0) continue;
    const eta=e.EstimateTime;
    if(eta==null||eta>MAX_ETA_MIN*60) continue;
    const route=(e.RouteName&&e.RouteName.Zh_tw)||"";
    const key=[route,e.Direction??0,e.StopUID||"",(e.StopName&&e.StopName.Zh_tw)||"",e.StopSequence].join("|");
    if(!cand.has(key)||eta<cand.get(key).eta)
      cand.set(key,{route,dir:e.Direction??0,uid:e.StopUID||"",stop:(e.StopName&&e.StopName.Zh_tw)||"",seq:e.StopSequence,eta});
  }
  return cand;
}
function nowHm(){ return new Date().toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit"}); }

/* ====== 畫面 ====== */
// 已選的目的地捷運站名集合（空＝全部）；以 DEFAULT_DEST 為預設
const _destSel=new Set(DEFAULT_DEST.split(",").map(s=>s.trim()).filter(Boolean));
// 用紅線站清單渲染「目的地捷運站」可複選膠囊，保留目前選擇
function populateDest(stations){
  const box=$("#dest"); if(!box||!stations||!stations.length) return;
  // 校正選擇：精準站名留著；對不上的試著用包含關係比對（例如「明德」↔「明德站」），都對不上才丟掉
  const names=new Set(stations.map(m=>m.name));
  for(const n of [..._destSel]){
    if(names.has(n)) continue;
    const m=stations.find(s=>s.name.includes(n)||n.includes(s.name));
    _destSel.delete(n);
    if(m) _destSel.add(m.name);
  }
  const allActive=_destSel.size===0?" active":"";
  box.innerHTML=`<button type="button" class="chip all${allActive}" data-name="">全部</button>`
    +stations.map(m=>{
      const on=_destSel.has(m.name)?" active":"";
      return `<button type="button" class="chip${on}" data-name="${escapeHtml(m.name)}">${escapeHtml(m.name)}</button>`;
    }).join("");
}
// 產生 Google Maps 路線導航連結；座標不齊就回傳 null（該按鈕不顯示）
function gmapDir(oLat,oLon,dLat,dLon,mode){
  if(oLat==null||oLon==null||dLat==null||dLon==null) return null;
  return `https://www.google.com/maps/dir/?api=1`
    +`&origin=${oLat},${oLon}&destination=${dLat},${dLon}&travelmode=${mode}`;
}
function navLink(url,label){
  return url?`<a class="nav-btn" href="${url}" target="_blank" rel="noopener">${label}</a>`:"";
}
function renderResults(list){
  const box=$("#results"); box.className="results"; box.hidden=false;
  box.innerHTML=list.map(r=>{
    const isCo=r.dir==="toCompany";
    const destLabel=isCo?"公司":`${escapeHtml(r.mrt)}站`;
    const soon=r.etaMin<=1;
    const walk=r.walk!=null?`走路約 ${Math.round(r.walk)} 公尺`:"附近站牌";
    const navWalkOn=gmapDir(r.fromLat,r.fromLon,r.boardLat,r.boardLon,"walking");
    const navBus=gmapDir(r.boardLat,r.boardLon,r.getOffLat,r.getOffLon,"transit");
    const navWalkMrt=gmapDir(r.getOffLat,r.getOffLon,r.mrtLat,r.mrtLon,"walking");
    const nav=[
      navLink(navWalkOn,"🚶 到上車站"),
      navLink(navBus,"🚌 公車路線"),
      navLink(navWalkMrt,isCo?"🚶 到公司":"🚶 到捷運站")
    ].join("");
    // 第一行資訊：往紅線＝走路到上車站＋到 X 站；到公司＝從 X 站走到上車站＋坐幾站到公司
    const firstLine=isCo
      ?`<span>從 ${escapeHtml(r.originMrt)}站 走 ${r.walk!=null?Math.round(r.walk)+" 公尺":""}到站牌</span><span class="mrt">約坐 ${r.ride} 站到公司</span>`
      :`<span>${walk}</span><span class="mrt">到 ${escapeHtml(r.mrt)}站 · 約坐 ${r.ride} 站</span>`;
    // 下車站到終點（捷運站／公司）的步行距離
    let toMrt="";
    if(r.getOffLat!=null&&r.mrtLat!=null){
      const d=Math.round(haversine(r.getOffLat,r.getOffLon,r.mrtLat,r.mrtLon));
      toMrt=`，再走約 ${d} 公尺到 ${destLabel}`;
    }
    // 走路時間 + 幾點出發（公車進站時間 - 走路時間）
    let depart="";
    if(r.walk!=null){
      const walkMin=Math.max(1,Math.round(r.walk/WALK_SPEED_MPM));
      const leaveIn=r.etaMin-walkMin;   // 還有幾分鐘該出發
      if(leaveIn<0){
        depart=`<div class="meta depart late"><span>🏃 走路約 ${walkMin} 分鐘 · 這班可能趕不上</span></div>`;
      }else if(leaveIn===0){
        depart=`<div class="meta depart late"><span>🏃 走路約 ${walkMin} 分鐘 · 現在就要出發</span></div>`;
      }else{
        const t=new Date(Date.now()+leaveIn*60000)
          .toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit"});
        depart=`<div class="meta depart"><span>🚶 走路約 ${walkMin} 分鐘 · ${t} 出發</span></div>`;
      }
    }
    return `<div class="card">
      <div class="top">
        <div class="badge">${escapeHtml(r.route)}</div>
        <div class="stop">${escapeHtml(r.stop)}</div>
        <div class="eta ${soon?"soon":""}">
          <div class="num">${soon?"即將":r.etaMin}</div>
          <div class="unit">${soon?"進站":"分鐘"}</div>
        </div>
      </div>
      <div class="info">
        <div class="meta">${firstLine}</div>
        ${r.getOff?`<div class="meta getoff"><span>🚏 在「${escapeHtml(r.getOff)}」站下車${toMrt}</span></div>`:""}
        ${depart}
      </div>
      ${nav?`<div class="nav">${nav}</div>`:""}
    </div>`;
  }).join("");
}
function renderEmpty(pos,red){
  const near=[...red].map(m=>({...m,d:haversine(pos.lat,pos.lon,m.lat,m.lon)})).sort((a,b)=>a.d-b.d).slice(0,3);
  $("#panel").hidden=false;
  $("#panel").innerHTML=`<div class="panel">
    <h2>附近沒有直達紅線的車</h2>
    <p>目前 ${MAX_ETA_MIN} 分鐘內沒有可往紅線方向的公車。建議直接叫計程車到最近的紅線站：</p>
    <ul class="taxi-list">${near.map(m=>`<li><span>${escapeHtml(m.name)}站</span><span class="d">約 ${Math.round(m.d)} 公尺</span></li>`).join("")}</ul>
  </div>`;
  setStatus("");
}
function renderEmptyCompany(origins){
  $("#panel").hidden=false;
  $("#panel").innerHTML=`<div class="panel">
    <h2>這些捷運站附近沒有到公司的車</h2>
    <p>從 ${escapeHtml(origins.map(o=>o.name+"站").join("、"))} 出發，目前 ${MAX_ETA_MIN} 分鐘內沒有會開到公司座標 ${COMPANY_MATCH_M} 公尺內的公車。可改選其他捷運站，或確認公司座標填對了。</p>
  </div>`;
  setStatus("");
}
function renderError(err){
  let title="出了點問題", msg="請稍後再試一次。", detail="";
  if(err.kind==="nokey"){ title="還沒設定 TDX 金鑰"; msg="點右下「設定」貼上 Client Id 與 Secret（到 tdx.transportdata.tw 免費註冊取得），存檔後再查一次。"; }
  else if(err.kind==="auth"){ title="金鑰無法驗證"; msg="Client Id 或 Secret 可能填錯，請到「設定」確認後重存。"; }
  else if(err.kind==="geo"){ title="拿不到你的位置"; msg="請允許瀏覽器定位權限；或改用上方的「手動座標」模式直接輸入位置。"; }
  else if(err.kind==="noorigin"){ title="先選出發捷運站"; msg="「紅線到公司」模式要先在下面點選至少一個出發捷運站（你會在哪幾站下車轉公車），再按查詢。"; }
  else if(err.kind==="rate"){ title="查詢太頻繁"; msg="TDX 流量達到上限，請過一下再查。"; }
  else if(err.kind==="api"){
    if(err.status===401||err.status===403){ title="進階服務可能未開通"; msg="附近查詢用到 TDX 的「進階服務」。請到 TDX 會員中心確認你的方案有含進階服務（一般會員預設多半有）；若剛申請，有時需要一點時間生效。"; }
    else { title="TDX 回應錯誤"; msg="伺服器回傳狀態碼 "+err.status+"，請稍後再試。"; }
    detail=err.path||"";
  }
  else if(err.kind==="network"){
    title="連不上 TDX";
    msg="瀏覽器擋下了「"+(err.where||"")+"」的請求。最常見原因：①現在是在預覽視窗或直接開檔案 → 請先把網頁放到 https 網址（例如 Netlify）再開；②瀏覽器跨域（CORS）限制。如果放到 https 仍出現這個錯，代表 TDX 不允許純前端直接呼叫，需要加一個小型代理（我可以幫你做）。";
    detail=String(err.detail||"");
  } else {
    detail=String((err&&err.message)||err||"");
  }
  $("#panel").hidden=false;
  $("#panel").innerHTML=`<div class="panel error"><h2>${escapeHtml(title)}</h2><p style="margin:0 0 ${detail?"8px":"0"}">${msg}</p>${detail?`<p style="margin:0;font-size:12px;color:var(--slate)">技術細節：${escapeHtml(detail)}</p>`:""}</div>`;
  setStatus("");
}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

/* ====== 設定面板 ====== */
function openSettings(){ $("#settings").classList.add("open"); $("#settings").scrollIntoView({behavior:"smooth"}); }
$("#toggleSettings").addEventListener("click",()=>$("#settings").classList.toggle("open"));
$("#save").addEventListener("click",()=>{
  const id=$("#cid").value.trim(), secret=$("#csec").value.trim();
  if(id){ safeLS.set("tdx_id",id); MEM.id=id; }
  if(secret){ safeLS.set("tdx_secret",secret); MEM.secret=secret; }
  _token=null;
  $("#settings").classList.remove("open");
  setStatus("設定已儲存。");
});
// 預填已存的金鑰（方便修改）
$("#cid").value=safeLS.get("tdx_id")||"";
$("#csec").value=safeLS.get("tdx_secret")||"";

$("#go").addEventListener("click",run);

// 開頁先嘗試載入紅線站清單填入篩選器（沒金鑰就略過，等第一次查詢時再填）
if(getKeys().id){ getRedStations().then(populateDest).catch(()=>{}); }
// 點膠囊切換目的地；「全部」清空，其他則 toggle
$("#dest").addEventListener("click",e=>{
  const b=e.target.closest(".chip"); if(!b) return;
  const name=b.dataset.name;
  if(name===""){ _destSel.clear(); }
  else if(_destSel.has(name)){ _destSel.delete(name); }
  else { _destSel.add(name); }
  // 更新 active 狀態（不自動查詢，等使用者按「查詢」）
  $("#dest").querySelectorAll(".chip").forEach(c=>{
    const n=c.dataset.name;
    c.classList.toggle("active", n===""? _destSel.size===0 : _destSel.has(n));
  });
});

// 依目前 locMode / searchDir 調整 UI 文字與顯示
function updateModeUI(){
  // 方向切換鈕只在手動座標模式出現
  $("#dirSeg").hidden = (locMode!=="manual");
  // 切回 GPS 時，公司模式沒意義（需要公司座標）→ 退回往紅線
  if(locMode!=="manual" && searchDir==="toCompany"){
    searchDir="toRed";
    $("#dirSeg").querySelectorAll(".seg-btn").forEach(x=>x.classList.toggle("active",x.dataset.dir==="toRed"));
  }
  const co=searchDir==="toCompany";
  $("#destLabel").innerHTML = co
    ? '出發捷運站<span class="dest-hint">（會在哪幾站下車轉公車，至少選一個）</span>'
    : '目的地捷運站<span class="dest-hint">（可複選，不選＝全部）</span>';
  $("#dest").classList.toggle("dest-co", co);
  $("#mlatLabel").textContent = co ? "緯度（公司）" : "緯度";
  $("#go").innerHTML = co ? '🏢&nbsp; 查到公司的車' : '🔴&nbsp; 查附近的車';
}

// 切換 GPS / 手動座標
$("#seg").addEventListener("click",e=>{
  const b=e.target.closest(".seg-btn"); if(!b) return;
  locMode=b.dataset.mode;
  $("#seg").querySelectorAll(".seg-btn").forEach(x=>x.classList.toggle("active",x===b));
  $("#manualBox").hidden = (locMode!=="manual");
  updateModeUI();
});

// 切換搜尋方向（往紅線 / 紅線到公司）
$("#dirSeg").addEventListener("click",e=>{
  const b=e.target.closest(".seg-btn"); if(!b) return;
  searchDir=b.dataset.dir;
  $("#dirSeg").querySelectorAll(".seg-btn").forEach(x=>x.classList.toggle("active",x===b));
  updateModeUI();
});

updateModeUI();
